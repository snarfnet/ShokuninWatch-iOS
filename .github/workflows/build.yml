name: Build and Upload to App Store

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode 26
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 10 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Patch Info.plist after xcodegen
      run: |
        # Patch build number
        sed -i "" "s|<string>\$(CURRENT_PROJECT_VERSION)</string>|<string>$BUILD_NUM</string>|" ShokuninWatch/Info.plist
        sed -i "" "/<key>CFBundleVersion<\/key>/{n;s|<string>[^<]*</string>|<string>$BUILD_NUM</string>|;}" ShokuninWatch/Info.plist
        # Add iPad orientations and LaunchStoryboardName via PlistBuddy
        /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" ShokuninWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" ShokuninWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:1 string UIInterfaceOrientationPortraitUpsideDown" ShokuninWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:2 string UIInterfaceOrientationLandscapeLeft" ShokuninWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:3 string UIInterfaceOrientationLandscapeRight" ShokuninWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Delete :UILaunchStoryboardName" ShokuninWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UILaunchStoryboardName string LaunchScreen" ShokuninWatch/Info.plist
        /usr/libexec/PlistBuddy -c "Delete :UILaunchScreen" ShokuninWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" ShokuninWatch/Info.plist
        grep -A1 CFBundleVersion ShokuninWatch/Info.plist
        echo "--- iPad orientations ---"
        /usr/libexec/PlistBuddy -c "Print :UISupportedInterfaceOrientations~ipad" ShokuninWatch/Info.plist

    - name: Import Distribution Certificate
      env:
        CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        echo "$CERT_BASE64" | base64 -D > cert.p12
        security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        rm cert.p12

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme ShokuninWatch \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/ShokuninWatch.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/ShokuninWatch.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Submit for Review
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }}
