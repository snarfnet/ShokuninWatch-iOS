name: Capture App Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
          else
            XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
            sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild build \
            -scheme ShokuninWatch \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Capture iPhone screenshots
        run: |
          set -euo pipefail
          APP_PATH=$(find build/DerivedData/Build/Products/Debug-iphonesimulator -name "ShokuninWatch.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "App not found"
            exit 1
          fi

          xcrun simctl list -j devicetypes runtimes > simctl.json
          python3 <<'PY' > sim.env
          import json

          with open("simctl.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          runtimes = [
              r for r in data["runtimes"]
              if r.get("isAvailable") and r.get("platform") == "iOS"
          ]
          if not runtimes:
              raise SystemExit("No available iOS runtime")

          def version_tuple(runtime):
              return tuple(int(part) for part in runtime.get("version", "0").split(".") if part.isdigit())

          runtime = sorted(runtimes, key=version_tuple)[-1]
          devices = [d for d in data["devicetypes"] if d.get("productFamily") == "iPhone"]

          preferred = ["iPhone 16 Pro Max", "iPhone 15 Pro Max", "iPhone 14 Pro Max"]
          device = None
          for name in preferred:
              device = next((d for d in devices if d.get("name") == name), None)
              if device:
                  break
          if device is None:
              device = devices[-1]

          print(f"DEVICE_TYPE={device['identifier']}")
          print(f"RUNTIME={runtime['identifier']}")
          PY
          source sim.env
          echo "Using device type: $DEVICE_TYPE"
          echo "Using runtime: $RUNTIME"
          DEVICE_ID=$(xcrun simctl create "ShokuninWatch Screenshots" "$DEVICE_TYPE" "$RUNTIME")

          mkdir -p screenshots-new
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

          capture() {
            local tab="$1"
            local file="$2"
            xcrun simctl terminate "$DEVICE_ID" com.snarfnet.shokuninwatch.ios || true
            if [ "$tab" = "angle" ]; then
              xcrun simctl launch "$DEVICE_ID" com.snarfnet.shokuninwatch.ios -screenshots
            else
              xcrun simctl launch "$DEVICE_ID" com.snarfnet.shokuninwatch.ios -screenshots -screenshotTab "$tab"
            fi
            sleep 4
            xcrun simctl io "$DEVICE_ID" screenshot "screenshots-new/$file"
          }

          capture angle iphone_1_angle.png
          capture level iphone_2_level.png
          capture converter iphone_3_converter.png

          xcrun simctl shutdown "$DEVICE_ID"
          xcrun simctl delete "$DEVICE_ID"

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: shokuninwatch-screenshots
          path: screenshots-new/*.png

      - name: Set up ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

      - name: Install PyJWT
        run: pip3 install --break-system-packages PyJWT requests

      - name: Upload screenshots to ASC
        run: python3 scripts/upload_screenshots.py
