name: ShokuninWatch
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0
options:
  bundleIdPrefix: com.snarfnet
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

targets:
  ShokuninWatch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ShokuninWatch
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.shokuninwatch.ios
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ShokuninWatch/Info.plist
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: 83VGKGSQUH
        CODE_SIGN_STYLE: Automatic
    info:
      path: ShokuninWatch/Info.plist
      properties:
        CFBundleName: 職人スマホ
        CFBundleDisplayName: 職人スマホ
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMotionUsageDescription: 角度計と水平器のためにモーションセンサーを使用します。
        GADApplicationIdentifier: ca-app-pub-9404799280370656~5000819509
        NSUserTrackingUsageDescription: パーソナライズ広告のためにデータを使用します。
